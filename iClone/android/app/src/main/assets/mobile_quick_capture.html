<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>iClone Mobile</title>
  <style>
    :root {
      --bg: #f3efe7;
      --paper: #fffaf2;
      --panel: #f6efe4;
      --line: #d9cfbf;
      --ink: #1d2421;
      --subtle: #6f685e;
      --accent: #0f766e;
      --history-soft: #edf4fb;
      --workspace-soft: #eef8f0;
      --ok-bg: rgba(22, 163, 74, 0.14);
      --ok-ink: #166534;
      --muted-bg: #e4ddd1;
      --muted-ink: #81786c;
      --bad-bg: rgba(220, 38, 38, 0.12);
      --bad-ink: #b91c1c;
      --shadow: 0 16px 42px rgba(40, 35, 26, 0.09);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.75), transparent 40%),
        linear-gradient(180deg, #efe4d6 0%, var(--bg) 100%);
      color: var(--ink);
      font-family: "Yu Gothic UI", "Hiragino Sans", sans-serif;
    }

    .phone {
      max-width: 420px;
      min-height: 100vh;
      margin: 0 auto;
      padding: 18px 16px 28px;
    }

    .shell,
    .panel,
    .tab-button {
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    .shell,
    .panel { background: var(--paper); }

    .shell { padding: 18px; }

    h1, h2, p { margin-top: 0; }

    .eyebrow,
    .compose-label,
    .section-label,
    .status-title {
      margin-bottom: 8px;
      color: var(--subtle);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin-bottom: 8px;
      font-size: 28px;
      line-height: 1.1;
    }

    .lede {
      margin-bottom: 16px;
      color: #4d4b45;
      line-height: 1.6;
    }

    .tab-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 16px;
    }

    .tab-button {
      padding: 10px 12px;
      background: #eee5d9;
      color: var(--ink);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .tab-button.history { background: var(--history-soft); color: #3e607f; }
    .tab-button.workspace { background: var(--workspace-soft); color: #3d684d; }
    .tab-button.active { box-shadow: inset 0 0 0 2px rgba(29, 36, 33, 0.08), var(--shadow); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .compose-panel {
      padding: 18px;
      background: linear-gradient(180deg, rgba(15, 118, 110, 0.06), rgba(255, 250, 242, 0));
    }

    input[type="text"],
    textarea,
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fffdf9;
      color: var(--ink);
      font: inherit;
    }

    input[type="text"] {
      padding: 13px 14px;
      margin-bottom: 12px;
    }

    textarea {
      min-height: 152px;
      padding: 14px;
      resize: none;
    }

    .panel-help {
      color: var(--subtle);
      font-size: 13px;
      line-height: 1.5;
    }

    .tray {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    .tray button,
    .primary {
      border: 0;
      border-radius: 18px;
      font: inherit;
      cursor: pointer;
    }

    .tray button {
      flex: 1;
      padding: 11px 12px;
      background: #ece4d8;
      color: var(--ink);
    }

    .primary {
      width: 100%;
      margin-top: 14px;
      padding: 15px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
    }

    .toast {
      min-height: 24px;
      margin-top: 10px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
    }

    .preview {
      display: none;
      margin-top: 14px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--panel);
    }

    .preview img {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 10;
      object-fit: cover;
    }

    .followup-panel,
    .status-panel,
    .list-panel {
      margin-top: 16px;
      padding: 16px;
    }

    .followup-box {
      min-height: 132px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1.6;
    }

    .followup-box.ready {
      justify-content: flex-start;
      align-items: flex-start;
      text-align: left;
    }

    .followup-box.waiting { color: var(--subtle); }

    .status-grid {
      display: grid;
      gap: 10px;
    }

    .status-item {
      padding: 12px 14px;
      border-radius: 18px;
      border: 1px solid transparent;
      background: #efe7da;
    }

    .status-name {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
      font-weight: 700;
    }

    .status-copy {
      color: var(--subtle);
      font-size: 13px;
      line-height: 1.5;
    }

    .status-item.current {
      background: var(--ok-bg);
      border-color: rgba(22, 163, 74, 0.18);
      color: var(--ok-ink);
    }

    .status-item.current .status-copy { color: var(--ok-ink); }

    .status-item.complete {
      background: var(--muted-bg);
      color: var(--muted-ink);
    }

    .status-item.complete .status-copy { color: var(--muted-ink); }

    .status-item.pending {
      background: var(--bad-bg);
      color: var(--bad-ink);
    }

    .status-item.pending .status-copy { color: var(--bad-ink); }

    .panel-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }

    .history-list,
    .memo-list {
      display: grid;
      gap: 10px;
    }

    .history-item,
    .memo-item {
      padding: 13px 14px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: #fffdf8;
    }

    .item-title {
      margin-bottom: 4px;
      font-weight: 700;
    }

    .item-body { line-height: 1.55; }

    .item-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
      color: var(--subtle);
      font-size: 12px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      border-radius: 999px;
      background: var(--panel);
      color: #554f45;
    }

    .empty {
      padding: 18px;
      border: 1px dashed var(--line);
      border-radius: 18px;
      color: var(--subtle);
      text-align: center;
      line-height: 1.6;
      background: rgba(255, 255, 255, 0.45);
    }
  </style>
</head>
<body>
  <main class="phone">
    <section class="shell">
      <p class="eyebrow">Xperia 5 III / Mobile workspace</p>
      <h1>その場で残す</h1>
      <p class="lede">言葉でも写真でも、いまの気づきをそのまま置いて、あとで PC ワークスペースへコピーします。</p>

      <div class="tab-row">
        <button class="tab-button active" id="tabCapture" type="button">入力</button>
        <button class="tab-button history" id="tabHistory" type="button">履歴</button>
        <button class="tab-button workspace" id="tabWorkspace" type="button">ワークスペース</button>
      </div>

      <section class="tab-panel active" id="panelCapture">
        <section class="panel compose-panel">
          <p class="compose-label">メモ</p>
          <input id="headlineInput" type="text" placeholder="見出しを入れると、あとで探しやすくなります">
          <textarea id="memoInput" placeholder="気づいたことをそのまま書きます。音声の文字起こしもここへ入る想定です。"></textarea>

          <div class="preview" id="photoPreview">
            <img id="photoPreviewImage" alt="選択した写真のプレビュー">
          </div>

          <input id="photoInput" type="file" accept="image/*" hidden>
          <div class="tray">
            <button type="button" id="photoButton">写真を添付</button>
            <button type="button" id="clearPhotoButton">写真を外す</button>
          </div>
          <button class="primary" type="button" id="saveButton">記録を確定</button>
          <p class="toast" id="statusText"></p>
        </section>

        <section class="panel followup-panel">
          <p class="section-label">次の質問</p>
          <div class="followup-box waiting" id="followupBody">PC 同期待ち</div>
        </section>

        <section class="panel status-panel">
          <p class="status-title">コピー状況</p>
          <div class="status-grid">
            <article class="status-item pending" id="localCard">
              <div class="status-name" id="localLabel">× Local</div>
              <div class="status-copy">スマホだけでメモできます。</div>
            </article>
            <article class="status-item pending" id="pcCard">
              <div class="status-name" id="pcLabel">× PC</div>
              <div class="status-copy">PC ワークスペースへコピーされます。</div>
            </article>
            <article class="status-item pending" id="pcSyncedCard">
              <div class="status-name" id="pcSyncedLabel">× PC synced</div>
              <div class="status-copy">次の質問まで続けて見返せます。</div>
            </article>
          </div>
        </section>
      </section>

      <section class="tab-panel" id="panelHistory">
        <section class="panel list-panel">
          <div class="panel-head">
            <div>
              <p class="section-label">履歴</p>
              <h2>見返したメモ</h2>
            </div>
          </div>
          <p class="panel-help">確認した順に並びます。</p>
          <div class="history-list" id="historyList"></div>
        </section>
      </section>

      <section class="tab-panel" id="panelWorkspace">
        <section class="panel list-panel">
          <div class="panel-head">
            <div>
              <p class="section-label">ワークスペース</p>
              <h2>端末にあるメモ</h2>
            </div>
            <select id="sortSelect">
              <option value="updated_desc">新しい順</option>
              <option value="updated_asc">古い順</option>
              <option value="mode">種別順</option>
            </select>
          </div>
          <p class="panel-help">あとで PC へコピーされるメモです。</p>
          <div class="memo-list" id="memoList"></div>
        </section>
      </section>
    </section>
  </main>

  <script>
    const bridge = window.iCloneBridge || {
      bootstrapState() {
        return JSON.stringify({
          draft: { headline: "", body: "" },
          entries: [],
          history: [],
          latestQuestion: null,
          sync: { local: false, pc: false, pcSynced: false }
        });
      },
      saveDraft(payload) { return payload; },
      autosaveEntry(payload) { return payload; },
      saveEntry(payload) { return payload; },
      markViewed() { return ""; }
    };

    const state = {
      bootstrap: null,
      selectedPhoto: null,
      autosaveTimer: null,
      toastTimer: null
    };

    const refs = {
      headline: document.getElementById("headlineInput"),
      memo: document.getElementById("memoInput"),
      followupBody: document.getElementById("followupBody"),
      statusText: document.getElementById("statusText"),
      historyList: document.getElementById("historyList"),
      memoList: document.getElementById("memoList"),
      sortSelect: document.getElementById("sortSelect"),
      localCard: document.getElementById("localCard"),
      pcCard: document.getElementById("pcCard"),
      pcSyncedCard: document.getElementById("pcSyncedCard"),
      localLabel: document.getElementById("localLabel"),
      pcLabel: document.getElementById("pcLabel"),
      pcSyncedLabel: document.getElementById("pcSyncedLabel"),
      photoInput: document.getElementById("photoInput"),
      photoPreview: document.getElementById("photoPreview"),
      photoPreviewImage: document.getElementById("photoPreviewImage")
    };

    function parseBootstrap() {
      try {
        return JSON.parse(bridge.bootstrapState());
      } catch (error) {
        return {
          draft: { headline: "", body: "" },
          entries: [],
          history: [],
          latestQuestion: null,
          sync: { local: false, pc: false, pcSynced: false }
        };
      }
    }

    function setTab(tabName) {
      const map = {
        capture: ["tabCapture", "panelCapture"],
        history: ["tabHistory", "panelHistory"],
        workspace: ["tabWorkspace", "panelWorkspace"]
      };
      Object.entries(map).forEach(([name, ids]) => {
        document.getElementById(ids[0]).classList.toggle("active", name === tabName);
        document.getElementById(ids[1]).classList.toggle("active", name === tabName);
      });
    }

    function syncStage(sync) {
      if (sync.pcSynced) return "pcSynced";
      if (sync.pc) return "pc";
      if (sync.local) return "local";
      return "none";
    }

    function applyStatusCard(card, label, marker, className) {
      card.className = `status-item ${className}`;
      label.textContent = `${marker} ${label.dataset.name}`;
    }

    function renderSync(sync) {
      refs.localLabel.dataset.name = "Local";
      refs.pcLabel.dataset.name = "PC";
      refs.pcSyncedLabel.dataset.name = "PC synced";

      const stage = syncStage(sync);
      if (stage === "pcSynced") {
        applyStatusCard(refs.localCard, refs.localLabel, "✓", "complete");
        applyStatusCard(refs.pcCard, refs.pcLabel, "✓", "complete");
        applyStatusCard(refs.pcSyncedCard, refs.pcSyncedLabel, "✓", "current");
        return;
      }
      if (stage === "pc") {
        applyStatusCard(refs.localCard, refs.localLabel, "✓", "complete");
        applyStatusCard(refs.pcCard, refs.pcLabel, "✓", "current");
        applyStatusCard(refs.pcSyncedCard, refs.pcSyncedLabel, "×", "pending");
        return;
      }
      if (stage === "local") {
        applyStatusCard(refs.localCard, refs.localLabel, "✓", "current");
        applyStatusCard(refs.pcCard, refs.pcLabel, "×", "pending");
        applyStatusCard(refs.pcSyncedCard, refs.pcSyncedLabel, "×", "pending");
        return;
      }
      applyStatusCard(refs.localCard, refs.localLabel, "×", "pending");
      applyStatusCard(refs.pcCard, refs.pcLabel, "×", "pending");
      applyStatusCard(refs.pcSyncedCard, refs.pcSyncedLabel, "×", "pending");
    }

    function renderQuestion(question) {
      const hasQuestion = question && question.body;
      refs.followupBody.classList.toggle("ready", hasQuestion);
      refs.followupBody.classList.toggle("waiting", !hasQuestion);
      refs.followupBody.textContent = hasQuestion ? question.body : "PC 同期待ち";
    }

    function renderWorkspace(entries) {
      const sorted = [...entries];
      const mode = refs.sortSelect.value;
      if (mode === "updated_asc") {
        sorted.sort((a, b) => String(a.updatedAt).localeCompare(String(b.updatedAt)));
      } else if (mode === "mode") {
        sorted.sort((a, b) => String(a.inputMode).localeCompare(String(b.inputMode)));
      } else {
        sorted.sort((a, b) => String(b.updatedAt).localeCompare(String(a.updatedAt)));
      }

      if (sorted.length === 0) {
        refs.memoList.innerHTML = '<div class="empty">まだメモがありません。</div>';
        return;
      }

      refs.memoList.innerHTML = sorted.map((entry) => `
        <article class="memo-item" data-entry-id="${entry.entryId || ""}">
          <div class="item-title">${entry.headline || entry.entryId}</div>
          <div class="item-body">${entry.body || ""}</div>
          <div class="item-meta">
            <span class="tag">${entry.inputMode || "text"}</span>
            <span>${entry.updatedAt || "-"}</span>
            <span>${entry.syncStage || "Local"}</span>
          </div>
        </article>
      `).join("");

      refs.memoList.querySelectorAll("[data-entry-id]").forEach((element) => {
        element.addEventListener("click", () => {
          bridge.markViewed(element.getAttribute("data-entry-id"));
          refresh();
          setTab("history");
        });
      });
    }

    function renderHistory(history) {
      if (!history || history.length === 0) {
        refs.historyList.innerHTML = '<div class="empty">まだ履歴がありません。</div>';
        return;
      }

      refs.historyList.innerHTML = history.map((item) => `
        <article class="history-item">
          <div class="item-title">${item.headline || item.entryId}</div>
          <div class="item-meta">
            <span>${item.viewedAt || "-"}</span>
            <span>${item.projectId || "-"}</span>
          </div>
        </article>
      `).join("");
    }

    function renderDraft(draft) {
      refs.headline.value = draft.headline || "";
      refs.memo.value = draft.body || "";
    }

    function toast(text) {
      refs.statusText.textContent = text;
      if (state.toastTimer) {
        window.clearTimeout(state.toastTimer);
      }
      state.toastTimer = window.setTimeout(() => {
        refs.statusText.textContent = "";
      }, 1600);
    }

    function currentPayload() {
      return {
        headline: refs.headline.value,
        body: refs.memo.value,
        attachment: state.selectedPhoto
      };
    }

    function persistDraftAndEntry() {
      const payload = JSON.stringify(currentPayload());
      bridge.saveDraft(payload);
      bridge.autosaveEntry(payload);
    }

    function queueAutosave() {
      if (state.autosaveTimer) {
        window.clearTimeout(state.autosaveTimer);
      }
      state.autosaveTimer = window.setTimeout(() => {
        persistDraftAndEntry();
        refresh();
      }, 350);
    }

    function readSelectedPhoto(file) {
      if (!file) {
        state.selectedPhoto = null;
        refs.photoPreview.style.display = "none";
        queueAutosave();
        return;
      }
      const reader = new FileReader();
      reader.onload = () => {
        state.selectedPhoto = {
          name: file.name,
          mimeType: file.type || "image/jpeg",
          dataUrl: reader.result
        };
        refs.photoPreviewImage.src = reader.result;
        refs.photoPreview.style.display = "block";
        queueAutosave();
      };
      reader.readAsDataURL(file);
    }

    function saveEntryGesture() {
      try {
        const response = JSON.parse(bridge.saveEntry(JSON.stringify(currentPayload())));
        toast(response.message || "記録しました。");
      } catch (error) {
        toast("記録しました。");
      }
    }

    function refresh() {
      state.bootstrap = parseBootstrap();
      renderDraft(state.bootstrap.draft || {});
      renderQuestion(state.bootstrap.latestQuestion || null);
      renderSync(state.bootstrap.sync || { local: false, pc: false, pcSynced: false });
      renderWorkspace(state.bootstrap.entries || []);
      renderHistory(state.bootstrap.history || []);
    }

    refs.headline.addEventListener("input", queueAutosave);
    refs.memo.addEventListener("input", queueAutosave);
    refs.sortSelect.addEventListener("change", () => renderWorkspace((state.bootstrap || {}).entries || []));
    refs.photoInput.addEventListener("change", (event) => {
      const file = event.target.files && event.target.files[0];
      readSelectedPhoto(file);
    });
    document.getElementById("photoButton").addEventListener("click", () => refs.photoInput.click());
    document.getElementById("clearPhotoButton").addEventListener("click", () => {
      refs.photoInput.value = "";
      readSelectedPhoto(null);
    });
    document.getElementById("saveButton").addEventListener("click", saveEntryGesture);
    document.getElementById("tabCapture").addEventListener("click", () => setTab("capture"));
    document.getElementById("tabHistory").addEventListener("click", () => setTab("history"));
    document.getElementById("tabWorkspace").addEventListener("click", () => setTab("workspace"));

    refresh();
  </script>
</body>
</html>
