<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>iClone Mobile</title>
  <style>
    :root {
      --bg: #f4efe6;
      --paper: #fffaf2;
      --panel: #f7f1e7;
      --line: #d9cfbf;
      --ink: #1d2421;
      --subtle: #6f685e;
      --accent: #0f766e;
      --accent-soft: rgba(15, 118, 110, 0.1);
      --good-bg: rgba(22, 163, 74, 0.14);
      --good-ink: #166534;
      --warn-bg: rgba(234, 179, 8, 0.16);
      --warn-ink: #a16207;
      --muted-bg: #e4ddd1;
      --muted-ink: #81786c;
      --bad-bg: rgba(220, 38, 38, 0.14);
      --bad-ink: #b91c1c;
      --shadow: 0 16px 42px rgba(40, 35, 26, 0.09);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.75), transparent 40%),
        linear-gradient(180deg, #efe4d6 0%, var(--bg) 100%);
      color: var(--ink);
      font-family: "Yu Gothic UI", "Hiragino Sans", sans-serif;
    }

    .phone {
      max-width: 420px;
      min-height: 100vh;
      margin: 0 auto;
      padding: 18px 16px 28px;
    }

    .shell,
    .panel {
      border: 1px solid var(--line);
      border-radius: 26px;
      background: var(--paper);
      box-shadow: var(--shadow);
    }

    .shell { padding: 16px; }
    .panel { padding: 16px; }
    .panel + .panel { margin-top: 14px; }

    .eyebrow,
    .section-label {
      margin: 0 0 8px;
      color: var(--subtle);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1, h2, h3, p { margin-top: 0; }
    h1, h2, h3 { margin-bottom: 0; }

    .status-inline,
    .footer-counts,
    .tab-row,
    .action-row,
    .tool-row,
    .record-actions,
    .record-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .status-pill,
    .footer-pill,
    .tab-button,
    .status-connector {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .status-pill.good { background: var(--good-bg); color: var(--good-ink); }
    .status-pill.muted { background: var(--muted-bg); color: var(--muted-ink); }
    .status-pill.bad { background: var(--bad-bg); color: var(--bad-ink); }
    .status-connector.good { background: var(--good-bg); color: var(--good-ink); }
    .status-connector.warn { background: var(--warn-bg); color: var(--warn-ink); }
    .status-connector.bad { background: var(--bad-bg); color: var(--bad-ink); }

    .tab-button {
      border: 1px solid var(--line);
      background: #eee5d9;
      color: var(--ink);
      cursor: pointer;
    }

    .tab-button.active {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .field {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .field span,
    .compact-setting span {
      color: var(--subtle);
      font-size: 12px;
    }

    input[type="text"],
    textarea,
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fffdf9;
      color: var(--ink);
      font: inherit;
    }

    input[type="text"],
    select {
      padding: 11px 12px;
    }

    textarea {
      min-height: 148px;
      padding: 13px;
      resize: none;
    }

    .ghost-button,
    .subtle-button,
    .primary-button,
    .secondary-button,
    .danger-button,
    .mini-button {
      border: 0;
      border-radius: 14px;
      font: inherit;
      cursor: pointer;
      padding: 10px 12px;
    }

    .ghost-button,
    .subtle-button,
    .mini-button {
      background: #ece4d8;
      color: var(--ink);
    }

    .primary-button {
      background: var(--accent);
      color: #fff;
      font-weight: 700;
    }

    .secondary-button {
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 700;
    }

    .danger-button,
    .mini-button.delete {
      background: rgba(220, 38, 38, 0.12);
      color: var(--bad-ink);
    }

    .settings-inline.hidden,
    .preview-card.hidden {
      display: none;
    }

    .settings-inline {
      display: grid;
      gap: 10px;
      margin-top: 12px;
      padding: 12px;
      border-radius: 18px;
      background: var(--panel);
    }

    .settings-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .compact-setting {
      display: grid;
      gap: 6px;
    }

    .settings-note,
    .action-note,
    .question-inline {
      margin-top: 10px;
      color: var(--subtle);
      line-height: 1.5;
    }

    .question-inline {
      padding: 10px 12px;
      border-radius: 16px;
      background: var(--panel);
    }

    .preview-card {
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 20px;
      overflow: hidden;
      background: var(--panel);
    }

    .preview-card img {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 10;
      object-fit: cover;
    }

    .record-list,
    .history-list {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .record-card,
    .history-card {
      border: 1px solid var(--line);
      border-radius: 20px;
      background: #fffdf8;
      padding: 14px;
    }

    .record-card.active {
      border-color: var(--accent);
      box-shadow: inset 0 0 0 1px var(--accent);
    }

    .record-meta {
      color: var(--subtle);
      font-size: 12px;
      margin-top: 6px;
    }

    .footer-bar {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      margin-top: 14px;
      color: var(--subtle);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <main class="phone">
    <section class="shell">
      <p class="eyebrow" id="topEyebrow"></p>
      <h1 id="topTitle"></h1>
      <div class="status-inline" id="statusRail"></div>

      <div class="tab-row">
        <button class="tab-button active" id="tabClone" type="button"></button>
        <button class="tab-button" id="tabHistory" type="button"></button>
      </div>

      <section class="tab-panel active" id="panelClone">
        <section class="panel">
          <div class="tool-row">
            <button class="ghost-button" type="button" id="settingsToggle"></button>
          </div>

          <section class="settings-inline hidden" id="settingsPanel">
            <div class="settings-grid">
              <label class="compact-setting">
                <span id="autoSaveLabel"></span>
                <select id="autoSaveEnabled"></select>
              </label>
              <label class="compact-setting">
                <span id="autoSaveIntervalLabel"></span>
                <select id="autoSaveInterval"></select>
              </label>
              <label class="compact-setting">
                <span id="autoSyncLabel"></span>
                <select id="autoSyncEnabled"></select>
              </label>
              <label class="compact-setting">
                <span id="autoSyncIntervalLabel"></span>
                <select id="autoSyncInterval"></select>
              </label>
            </div>
            <p class="settings-note" id="settingsNote"></p>
          </section>

          <label class="field">
            <span id="headlineLabel"></span>
            <input id="headlineInput" type="text">
          </label>
          <label class="field">
            <span id="bodyLabel"></span>
            <textarea id="bodyInput"></textarea>
          </label>

          <div class="tool-row">
            <input id="photoInput" type="file" accept="image/*" hidden>
            <button class="subtle-button" type="button" id="photoButton"></button>
            <button class="subtle-button" type="button" id="clearPhotoButton"></button>
            <button class="danger-button" type="button" id="deleteButton"></button>
          </div>

          <div class="preview-card hidden" id="photoPreviewCard">
            <img id="photoPreviewImage" alt="attachment preview">
          </div>

          <div class="action-row">
            <button class="primary-button" type="button" id="saveButton"></button>
            <button class="secondary-button" type="button" id="syncButton"></button>
          </div>

          <p class="action-note" id="actionNote"></p>
          <p class="question-inline" id="questionInline"></p>
        </section>

        <section class="panel">
          <p class="section-label" id="listLabel"></p>
          <h2 id="listTitle"></h2>
          <div class="record-list" id="recordList"></div>
        </section>
      </section>

      <section class="tab-panel" id="panelHistory">
        <section class="panel">
          <p class="section-label" id="historyLabel"></p>
          <h2 id="historyTitle"></h2>
          <div class="history-list" id="historyList"></div>
        </section>
      </section>

      <footer class="footer-bar">
        <div class="footer-counts" id="footerCounts"></div>
        <div class="footer-next-sync" id="footerNextSync"></div>
      </footer>
    </section>
  </main>

  <script>
    const TEXT = {
      eyebrow: "Xperia 5 III / Mobile workspace",
      title: "\u30c7\u30fc\u30bf\u30af\u30ed\u30fc\u30f3\u3092\u3059\u3050\u6b8b\u3059",
      tabClone: "\u30af\u30ed\u30fc\u30f3",
      tabHistory: "\u5c65\u6b74",
      listLabel: "\u30ef\u30fc\u30af\u30b9\u30da\u30fc\u30b9",
      listTitle: "\u3059\u3050\u89e6\u308c\u308b\u30c7\u30fc\u30bf",
      historyLabel: "\u5c65\u6b74",
      historyTitle: "\u898b\u8fd4\u3057",
      settingsToggleOpen: "\u8a2d\u5b9a",
      settingsToggleClose: "\u8a2d\u5b9a\u3092\u9589\u3058\u308b",
      autoSave: "\u81ea\u52d5\u4fdd\u5b58",
      autoSaveInterval: "\u4fdd\u5b58\u9593\u9694",
      autoSync: "\u81ea\u52d5\u540c\u671f",
      autoSyncInterval: "\u540c\u671f\u9593\u9694",
      settingsNote: "\u6b21\u306e\u540c\u671f",
      headline: "\u898b\u51fa\u3057",
      body: "\u30e1\u30e2",
      attach: "\u5199\u771f",
      detach: "\u5916\u3059",
      delete: "\u524a\u9664",
      save: "\u8a18\u9332\u3059\u308b",
      sync: "\u4eca\u3059\u3050\u30b3\u30d4\u30fc",
      noQuestion: "\u307e\u3060\u306a\u3057",
      questionPrefix: "\u6b21\u306e\u8cea\u554f",
      empty: "\u307e\u3060\u30c7\u30fc\u30bf\u304c\u3042\u308a\u307e\u305b\u3093",
      footerRecords: "\u30e1\u30e2",
      footerPhotos: "\u5199\u771f",
      footerQuestions: "\u8cea\u554f",
      footerNextSync: "\u6b21\u540c\u671f",
      on: "ON",
      off: "OFF",
      realtime: "\u30ea\u30a2\u30eb\u30bf\u30a4\u30e0",
      tenSec: "10\u79d2",
      oneMin: "1\u5206",
    };

    const bridge = window.iCloneBridge;
    const state = {
      bootstrap: null,
      selectedRecordId: "",
      pendingPhoto: null,
      saveTimer: null,
      syncTimer: null,
      settingsOpen: false,
    };

    const refs = {
      topEyebrow: document.getElementById("topEyebrow"),
      topTitle: document.getElementById("topTitle"),
      statusRail: document.getElementById("statusRail"),
      tabClone: document.getElementById("tabClone"),
      tabHistory: document.getElementById("tabHistory"),
      panelClone: document.getElementById("panelClone"),
      panelHistory: document.getElementById("panelHistory"),
      settingsToggle: document.getElementById("settingsToggle"),
      settingsPanel: document.getElementById("settingsPanel"),
      autoSaveLabel: document.getElementById("autoSaveLabel"),
      autoSaveEnabled: document.getElementById("autoSaveEnabled"),
      autoSaveIntervalLabel: document.getElementById("autoSaveIntervalLabel"),
      autoSaveInterval: document.getElementById("autoSaveInterval"),
      autoSyncLabel: document.getElementById("autoSyncLabel"),
      autoSyncEnabled: document.getElementById("autoSyncEnabled"),
      autoSyncIntervalLabel: document.getElementById("autoSyncIntervalLabel"),
      autoSyncInterval: document.getElementById("autoSyncInterval"),
      settingsNote: document.getElementById("settingsNote"),
      headlineLabel: document.getElementById("headlineLabel"),
      headlineInput: document.getElementById("headlineInput"),
      bodyLabel: document.getElementById("bodyLabel"),
      bodyInput: document.getElementById("bodyInput"),
      photoInput: document.getElementById("photoInput"),
      photoButton: document.getElementById("photoButton"),
      clearPhotoButton: document.getElementById("clearPhotoButton"),
      deleteButton: document.getElementById("deleteButton"),
      photoPreviewCard: document.getElementById("photoPreviewCard"),
      photoPreviewImage: document.getElementById("photoPreviewImage"),
      saveButton: document.getElementById("saveButton"),
      syncButton: document.getElementById("syncButton"),
      actionNote: document.getElementById("actionNote"),
      questionInline: document.getElementById("questionInline"),
      listLabel: document.getElementById("listLabel"),
      listTitle: document.getElementById("listTitle"),
      recordList: document.getElementById("recordList"),
      historyLabel: document.getElementById("historyLabel"),
      historyTitle: document.getElementById("historyTitle"),
      historyList: document.getElementById("historyList"),
      footerCounts: document.getElementById("footerCounts"),
      footerNextSync: document.getElementById("footerNextSync"),
    };

    function bootstrapState() {
      return JSON.parse(bridge.bootstrapState());
    }

    function setStaticText() {
      refs.topEyebrow.textContent = TEXT.eyebrow;
      refs.topTitle.textContent = TEXT.title;
      refs.tabClone.textContent = TEXT.tabClone;
      refs.tabHistory.textContent = TEXT.tabHistory;
      refs.settingsToggle.textContent = TEXT.settingsToggleOpen;
      refs.autoSaveLabel.textContent = TEXT.autoSave;
      refs.autoSaveIntervalLabel.textContent = TEXT.autoSaveInterval;
      refs.autoSyncLabel.textContent = TEXT.autoSync;
      refs.autoSyncIntervalLabel.textContent = TEXT.autoSyncInterval;
      refs.headlineLabel.textContent = TEXT.headline;
      refs.bodyLabel.textContent = TEXT.body;
      refs.photoButton.textContent = TEXT.attach;
      refs.clearPhotoButton.textContent = TEXT.detach;
      refs.deleteButton.textContent = TEXT.delete;
      refs.saveButton.textContent = TEXT.save;
      refs.syncButton.textContent = TEXT.sync;
      refs.listLabel.textContent = TEXT.listLabel;
      refs.listTitle.textContent = TEXT.listTitle;
      refs.historyLabel.textContent = TEXT.historyLabel;
      refs.historyTitle.textContent = TEXT.historyTitle;
      refs.headlineInput.placeholder = "\u898b\u51fa\u3057\u3092\u77ed\u304f\u5165\u308c\u307e\u3059";
      refs.bodyInput.placeholder = "\u30e1\u30e2\u3092\u305d\u306e\u307e\u307e\u5165\u308c\u307e\u3059";
    }

    function fillSelect(select, items) {
      select.innerHTML = items.map((item) => `<option value="${item.value}">${item.label}</option>`).join("");
    }

    function bootstrapSettingsUI() {
      fillSelect(refs.autoSaveEnabled, [{ value: "true", label: TEXT.on }, { value: "false", label: TEXT.off }]);
      fillSelect(refs.autoSyncEnabled, [{ value: "true", label: TEXT.on }, { value: "false", label: TEXT.off }]);
      fillSelect(refs.autoSaveInterval, [
        { value: "realtime", label: TEXT.realtime },
        { value: "10s", label: TEXT.tenSec },
        { value: "1m", label: TEXT.oneMin },
      ]);
      fillSelect(refs.autoSyncInterval, [
        { value: "realtime", label: TEXT.realtime },
        { value: "10s", label: TEXT.tenSec },
        { value: "1m", label: TEXT.oneMin },
      ]);
    }

    function syncSettingsToForm(settings) {
      refs.autoSaveEnabled.value = String(Boolean(settings.autoSaveEnabled));
      refs.autoSaveInterval.value = settings.autoSaveInterval;
      refs.autoSyncEnabled.value = String(Boolean(settings.autoSyncEnabled));
      refs.autoSyncInterval.value = settings.autoSyncInterval;
      refs.settingsNote.textContent = `${TEXT.settingsNote}: ${state.bootstrap.sync.nextSyncText}`;
    }

    function endpointMarkup(endpoint, muted) {
      const marker = endpoint.checked ? "\u2611" : "\u00d7";
      const className = endpoint.checked ? (muted ? "muted" : "good") : "bad";
      return `<span class="status-pill ${className}">${marker}${endpoint.label}</span>`;
    }

    function renderStatus() {
      const sync = state.bootstrap.sync;
      const connector = sync.connector || { text: "--×--", level: "bad" };
      const mobileMuted = Boolean(sync.server && sync.server.checked);
      refs.statusRail.innerHTML = [
        endpointMarkup(sync.mobile || { label: "Mobile", checked: true }, mobileMuted),
        `<span class="status-connector ${connector.level}">${connector.text}</span>`,
        endpointMarkup(sync.server || { label: "Server", checked: false }, false),
      ].join("");
    }

    function renderFooter() {
      const counts = state.bootstrap.counts;
      refs.footerCounts.innerHTML = [
        `${TEXT.footerRecords} ${counts.records}`,
        `${TEXT.footerPhotos} ${counts.photos}`,
        `${TEXT.footerQuestions} ${counts.questions}`,
      ]
        .map((item) => `<span class="footer-pill">${item}</span>`)
        .join("");
      refs.footerNextSync.textContent = `${TEXT.footerNextSync}: ${state.bootstrap.sync.nextSyncText}`;
    }

    function renderSelection() {
      const record = (state.bootstrap.entries || []).find((item) => item.entryId === state.selectedRecordId);
      if (!record) {
        refs.headlineInput.value = state.bootstrap.draft.headline || "";
        refs.bodyInput.value = state.bootstrap.draft.body || "";
        refs.photoPreviewCard.classList.add("hidden");
        refs.actionNote.textContent = "\u3059\u3050\u30af\u30ed\u30fc\u30f3\u3067\u304d\u307e\u3059";
        refs.questionInline.textContent = `${TEXT.questionPrefix}: ${TEXT.noQuestion}`;
        return;
      }
      refs.headlineInput.value = record.headline || "";
      refs.bodyInput.value = record.body || "";
      const photo = (record.attachments || []).find((item) => String(item.mimeType || "").startsWith("image/"));
      if (photo) {
        refs.photoPreviewImage.src = photo.path;
        refs.photoPreviewCard.classList.remove("hidden");
      } else {
        refs.photoPreviewCard.classList.add("hidden");
      }
      refs.actionNote.textContent = "\u9078\u629e\u4e2d\u306e\u30c7\u30fc\u30bf\u3092\u305d\u306e\u307e\u307e\u30b3\u30d4\u30fc\u3067\u304d\u307e\u3059";
      const latestQuestion = state.bootstrap.latestQuestion;
      refs.questionInline.textContent =
        latestQuestion && latestQuestion.body
          ? `${TEXT.questionPrefix}: ${latestQuestion.body}`
          : `${TEXT.questionPrefix}: ${TEXT.noQuestion}`;
    }

    function renderRecords() {
      const records = state.bootstrap.entries || [];
      if (records.length === 0) {
        refs.recordList.innerHTML = `<div class="record-card">${TEXT.empty}</div>`;
        return;
      }
      refs.recordList.innerHTML = records.map((record) => {
        const active = record.entryId === state.selectedRecordId ? " active" : "";
        return `
          <article class="record-card${active}" data-entry-id="${record.entryId}">
            <h3>${record.headline || record.entryId}</h3>
            <div class="record-meta">
              <span>${record.updatedAt || "-"}</span>
              <span>${record.inputMode || "text"}</span>
            </div>
            <p>${record.body || ""}</p>
            <div class="record-actions">
              <button class="mini-button" type="button" data-action="sync" data-entry-id="${record.entryId}">${TEXT.sync}</button>
              <button class="mini-button delete" type="button" data-action="delete" data-entry-id="${record.entryId}">${TEXT.delete}</button>
            </div>
          </article>
        `;
      }).join("");

      refs.recordList.querySelectorAll("[data-entry-id]").forEach((element) => {
        element.addEventListener("click", (event) => {
          const entryId = element.getAttribute("data-entry-id");
          const action = event.target.getAttribute("data-action");
          if (action === "sync") {
            event.stopPropagation();
            manualSync(entryId);
            return;
          }
          if (action === "delete") {
            event.stopPropagation();
            removeEntry(entryId);
            return;
          }
          state.selectedRecordId = entryId;
          bridge.markViewed(entryId);
          renderRecords();
          renderSelection();
          renderHistory();
        });
      });
    }

    function renderHistory() {
      const history = state.bootstrap.history || [];
      if (history.length === 0) {
        refs.historyList.innerHTML = `<div class="history-card">${TEXT.empty}</div>`;
        return;
      }
      refs.historyList.innerHTML = history.map((item) => `
        <article class="history-card">
          <strong>${item.headline || item.entryId}</strong>
          <div class="record-meta">
            <span>${item.viewedAt || "-"}</span>
            <span>${item.projectId || "-"}</span>
          </div>
        </article>
      `).join("");
    }

    function payloadFromForm() {
      return {
        headline: refs.headlineInput.value,
        body: refs.bodyInput.value,
        attachment: state.pendingPhoto,
      };
    }

    function delayFor(interval) {
      if (interval === "10s") return 10000;
      if (interval === "1m") return 60000;
      return 250;
    }

    function scheduleSaveAndSync() {
      const settings = state.bootstrap.settings;
      bridge.saveDraft(JSON.stringify(payloadFromForm()));
      if (settings.autoSaveEnabled) {
        window.clearTimeout(state.saveTimer);
        state.saveTimer = window.setTimeout(() => saveEntry(false), delayFor(settings.autoSaveInterval));
      }
      if (settings.autoSyncEnabled) {
        window.clearTimeout(state.syncTimer);
        state.syncTimer = window.setTimeout(() => syncEntry(false), delayFor(settings.autoSyncInterval));
      }
    }

    function loadPhoto(file) {
      if (!file) {
        state.pendingPhoto = null;
        refs.photoPreviewCard.classList.add("hidden");
        return;
      }
      const reader = new FileReader();
      reader.onload = () => {
        state.pendingPhoto = {
          name: file.name,
          mimeType: file.type || "image/jpeg",
          dataUrl: reader.result,
        };
        refs.photoPreviewImage.src = reader.result;
        refs.photoPreviewCard.classList.remove("hidden");
        scheduleSaveAndSync();
      };
      reader.readAsDataURL(file);
    }

    function saveEntry(showMessage) {
      const result = JSON.parse(bridge.saveLocalEntry(JSON.stringify(payloadFromForm())));
      reload();
      if (showMessage) refs.actionNote.textContent = result.message || "\u8a18\u9332\u3057\u307e\u3057\u305f";
    }

    function syncEntry(showMessage) {
      const result = JSON.parse(bridge.syncEntry(JSON.stringify(payloadFromForm())));
      reload();
      if (showMessage) refs.actionNote.textContent = result.message || "\u30b3\u30d4\u30fc\u3092\u4e88\u7d04\u3057\u307e\u3057\u305f";
    }

    function manualSync(entryId) {
      const record = (state.bootstrap.entries || []).find((item) => item.entryId === entryId);
      if (!record) return;
      state.selectedRecordId = entryId;
      refs.headlineInput.value = record.headline || "";
      refs.bodyInput.value = record.body || "";
      syncEntry(true);
    }

    function removeEntry(entryId) {
      const result = JSON.parse(bridge.deleteEntry(entryId));
      if (state.selectedRecordId === entryId) {
        state.selectedRecordId = "";
        state.pendingPhoto = null;
      }
      reload();
      refs.actionNote.textContent = result.message || "\u524a\u9664\u3057\u307e\u3057\u305f";
    }

    function saveSettings() {
      const payload = {
        autoSaveEnabled: refs.autoSaveEnabled.value === "true",
        autoSaveInterval: refs.autoSaveInterval.value,
        autoSyncEnabled: refs.autoSyncEnabled.value === "true",
        autoSyncInterval: refs.autoSyncInterval.value,
      };
      bridge.saveSettings(JSON.stringify(payload));
      reload();
      refs.actionNote.textContent = "\u8a2d\u5b9a\u3092\u66f4\u65b0\u3057\u307e\u3057\u305f";
    }

    function toggleSettings() {
      state.settingsOpen = !state.settingsOpen;
      refs.settingsPanel.classList.toggle("hidden", !state.settingsOpen);
      refs.settingsToggle.textContent = state.settingsOpen ? TEXT.settingsToggleClose : TEXT.settingsToggleOpen;
    }

    function setTab(name) {
      const cloneActive = name === "clone";
      refs.tabClone.classList.toggle("active", cloneActive);
      refs.tabHistory.classList.toggle("active", !cloneActive);
      refs.panelClone.classList.toggle("active", cloneActive);
      refs.panelHistory.classList.toggle("active", !cloneActive);
    }

    function reload() {
      state.bootstrap = bootstrapState();
      if (!state.selectedRecordId && state.bootstrap.entries.length > 0) {
        state.selectedRecordId = state.bootstrap.entries[0].entryId;
      }
      syncSettingsToForm(state.bootstrap.settings);
      renderStatus();
      renderRecords();
      renderSelection();
      renderHistory();
      renderFooter();
    }

    function bindEvents() {
      refs.settingsToggle.addEventListener("click", toggleSettings);
      refs.tabClone.addEventListener("click", () => setTab("clone"));
      refs.tabHistory.addEventListener("click", () => setTab("history"));
      refs.headlineInput.addEventListener("input", scheduleSaveAndSync);
      refs.bodyInput.addEventListener("input", scheduleSaveAndSync);
      refs.photoButton.addEventListener("click", () => refs.photoInput.click());
      refs.clearPhotoButton.addEventListener("click", () => {
        refs.photoInput.value = "";
        state.pendingPhoto = null;
        refs.photoPreviewCard.classList.add("hidden");
      });
      refs.photoInput.addEventListener("change", (event) => {
        const file = event.target.files && event.target.files[0];
        loadPhoto(file);
      });
      refs.saveButton.addEventListener("click", () => saveEntry(true));
      refs.syncButton.addEventListener("click", () => syncEntry(true));
      refs.deleteButton.addEventListener("click", () => {
        if (state.selectedRecordId) removeEntry(state.selectedRecordId);
      });
      [refs.autoSaveEnabled, refs.autoSaveInterval, refs.autoSyncEnabled, refs.autoSyncInterval].forEach((element) => {
        element.addEventListener("change", saveSettings);
      });
    }

    setStaticText();
    bootstrapSettingsUI();
    bindEvents();
    reload();
  </script>
</body>
</html>
