<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>iClone Mobile</title>
  <style>
    :root {
      --bg: #f4f0ea;
      --ink: #1f2423;
      --subtle: #645f56;
      --line: #d7cebf;
      --card: #fffaf3;
      --panel: #f1ebe1;
      --accent: #0f766e;
      --warn: #b45309;
      --blue: #edf4fb;
      --green: #eef8f0;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: radial-gradient(circle at top, #fbf7f0, var(--bg));
      color: var(--ink);
      font-family: "Yu Gothic UI", "Hiragino Sans", sans-serif;
    }

    .phone {
      max-width: 420px;
      min-height: 100vh;
      margin: 0 auto;
      padding: 18px 16px 28px;
    }

    .card, .panel {
      border: 1px solid var(--line);
      background: var(--card);
      border-radius: 24px;
      box-shadow: 0 12px 34px rgba(31, 36, 35, 0.08);
    }

    .card {
      padding: 20px;
    }

    p, h1, h2, h3 { margin-top: 0; }

    h1 {
      margin-bottom: 10px;
      font-size: 26px;
      line-height: 1.15;
    }

    .lede {
      color: var(--subtle);
      line-height: 1.6;
      margin-bottom: 14px;
    }

    .autosave-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(15, 118, 110, 0.12);
      color: var(--accent);
      font-weight: 700;
      font-size: 13px;
    }

    input[type="text"], textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fffdf8;
      font: inherit;
      color: inherit;
    }

    input[type="text"] {
      padding: 12px 14px;
      margin-top: 14px;
    }

    textarea {
      min-height: 132px;
      padding: 14px;
      margin-top: 12px;
      resize: none;
    }

    .tray {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    .tray button,
    .primary,
    .tab-button {
      border: 0;
      border-radius: 18px;
      font: inherit;
      cursor: pointer;
    }

    .tray button {
      flex: 1;
      padding: 11px 12px;
      background: #ece4d8;
    }

    .primary {
      width: 100%;
      margin-top: 18px;
      padding: 16px;
      background: var(--accent);
      color: white;
      font-weight: 700;
    }

    .status-text {
      margin-top: 12px;
      color: var(--warn);
      font-size: 13px;
      line-height: 1.6;
    }

    .tab-row {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      margin-bottom: 8px;
    }

    .tab-button {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid var(--line);
      background: #ede3d4;
      font-weight: 700;
    }

    .tab-button.history { background: var(--blue); color: #315a77; }
    .tab-button.workspace { background: var(--green); color: #39624b; }
    .tab-button.active { box-shadow: inset 0 0 0 2px rgba(31, 36, 35, 0.08); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .panel {
      margin-top: 14px;
      padding: 14px;
      background: var(--panel);
    }

    .followup {
      min-height: 132px;
    }

    .centered {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--subtle);
    }

    .mode-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .mode-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: #ece4d8;
      font-size: 13px;
      font-weight: 700;
    }

    .mode-label.done {
      background: rgba(22, 163, 74, 0.14);
      color: #166534;
    }

    .mode-label.pending {
      background: rgba(220, 38, 38, 0.12);
      color: #b91c1c;
    }

    .mode-help, .panel-help {
      margin: 0;
      color: var(--subtle);
      font-size: 13px;
      line-height: 1.6;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .memo-list, .history-list {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .memo-item, .history-item {
      padding: 12px;
      border-radius: 16px;
      background: #fffaf1;
      border: 1px solid var(--line);
    }

    .memo-meta, .history-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
      color: var(--subtle);
      font-size: 12px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      border-radius: 999px;
      background: #ece4d8;
      font-size: 12px;
      color: #554f45;
    }

    .preview {
      display: none;
      width: 100%;
      margin-top: 12px;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid var(--line);
    }

    .preview img {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 10;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <main class="phone">
    <div class="card">
      <p>Xperia 5 III / 現場メモ</p>
      <h1>使いたいようにメモする</h1>
      <p class="lede">保存ボタンを押す前でも自動で仮保存されます。必要なときだけ確定し、PC 側ワークスペースへ送ります。</p>
      <div class="autosave-chip" id="autosaveChip">自動仮保存中</div>

      <input id="headlineInput" type="text" placeholder="見出しを入れると、あとで探しやすくなります">
      <textarea id="memoInput" placeholder="気づいたこと、写真の意味、次に見たい観点をそのまま残します"></textarea>

      <div class="preview" id="photoPreview">
        <img id="photoPreviewImage" alt="選択した写真">
      </div>

      <input id="photoInput" type="file" accept="image/*" hidden>
      <div class="tray">
        <button type="button" id="photoButton">写真を添付</button>
        <button type="button" id="clearPhotoButton">写真を外す</button>
      </div>
      <button class="primary" type="button" id="saveButton">記録を確定</button>
      <p class="status-text" id="statusText">入力中の内容は端末に自動仮保存されます。確定すると PC 側ワークスペースへ送る対象になります。</p>

      <div class="tab-row">
        <button class="tab-button active" id="tabCapture" type="button">入力</button>
        <button class="tab-button history" id="tabHistory" type="button">履歴</button>
        <button class="tab-button workspace" id="tabWorkspace" type="button">ワークスペース</button>
      </div>

      <section class="tab-panel active" id="panelCapture">
        <section class="panel followup">
          <h2>次の質問</h2>
          <p class="centered" id="followupBody">PC 同期待ち</p>
        </section>

        <section class="panel">
          <div class="mode-row">
            <span class="mode-label pending" id="localLabel">× Local</span>
            <span class="mode-label pending" id="pcLabel">× PC</span>
            <span class="mode-label pending" id="pcSyncedLabel">× PC synced</span>
          </div>
          <p class="mode-help" id="modeHelp">スマホだけでメモできます。PC のワークスペース反映はまだ始まっていません。</p>
        </section>
      </section>

      <section class="tab-panel" id="panelHistory">
        <section class="panel">
          <h2>閲覧履歴</h2>
          <p class="panel-help">最近見返したメモです。現場で開いた順に振り返れます。</p>
          <div class="history-list" id="historyList"></div>
        </section>
      </section>

      <section class="tab-panel" id="panelWorkspace">
        <section class="panel">
          <div class="panel-head">
            <div>
              <h2>端末ワークスペース</h2>
              <p class="panel-help">端末上に保存したメモを並べ替えて読み返せます。</p>
            </div>
            <select id="sortSelect">
              <option value="updated_desc">新しい順</option>
              <option value="updated_asc">古い順</option>
              <option value="mode">種別順</option>
            </select>
          </div>
          <div class="memo-list" id="memoList"></div>
        </section>
      </section>
    </div>
  </main>

  <script>
    const bridge = window.iCloneBridge || {
      bootstrapState() {
        return JSON.stringify({
          draft: { headline: "", body: "" },
          entries: [],
          history: [],
          latestQuestion: null,
          sync: { local: false, pc: false, pcSynced: false, modeHelp: "プレビューでは端末内データだけを表示します。" }
        });
      },
      saveDraft(payload) { return payload; },
      saveEntry(payload) { return payload; },
      markViewed() { return ""; }
    };

    const state = {
      activeTab: "capture",
      bootstrap: null,
      selectedPhoto: null
    };

    const refs = {
      headline: document.getElementById("headlineInput"),
      memo: document.getElementById("memoInput"),
      followupBody: document.getElementById("followupBody"),
      statusText: document.getElementById("statusText"),
      autosaveChip: document.getElementById("autosaveChip"),
      historyList: document.getElementById("historyList"),
      memoList: document.getElementById("memoList"),
      sortSelect: document.getElementById("sortSelect"),
      localLabel: document.getElementById("localLabel"),
      pcLabel: document.getElementById("pcLabel"),
      pcSyncedLabel: document.getElementById("pcSyncedLabel"),
      modeHelp: document.getElementById("modeHelp"),
      photoInput: document.getElementById("photoInput"),
      photoPreview: document.getElementById("photoPreview"),
      photoPreviewImage: document.getElementById("photoPreviewImage")
    };

    function parseBootstrap() {
      try {
        return JSON.parse(bridge.bootstrapState());
      } catch (error) {
        return {
          draft: { headline: "", body: "" },
          entries: [],
          history: [],
          latestQuestion: null,
          sync: { local: false, pc: false, pcSynced: false, modeHelp: "データを読み込めませんでした。" }
        };
      }
    }

    function setTab(tabName) {
      state.activeTab = tabName;
      const map = {
        capture: ["tabCapture", "panelCapture"],
        history: ["tabHistory", "panelHistory"],
        workspace: ["tabWorkspace", "panelWorkspace"]
      };
      Object.entries(map).forEach(([name, ids]) => {
        document.getElementById(ids[0]).classList.toggle("active", name === tabName);
        document.getElementById(ids[1]).classList.toggle("active", name === tabName);
      });
    }

    function renderSync(sync) {
      const labelSpecs = [
        [refs.localLabel, sync.local, "Local"],
        [refs.pcLabel, sync.pc, "PC"],
        [refs.pcSyncedLabel, sync.pcSynced, "PC synced"]
      ];
      labelSpecs.forEach(([element, done, text]) => {
        element.textContent = `${done ? "✓" : "×"} ${text}`;
        element.className = `mode-label ${done ? "done" : "pending"}`;
      });
      refs.modeHelp.textContent = sync.modeHelp || "";
    }

    function renderQuestion(question) {
      refs.followupBody.classList.toggle("centered", !question || !question.body);
      refs.followupBody.textContent = question && question.body ? question.body : "PC 同期待ち";
    }

    function renderWorkspace(entries) {
      const sorted = [...entries];
      const mode = refs.sortSelect.value;
      if (mode === "updated_asc") {
        sorted.sort((a, b) => String(a.updatedAt).localeCompare(String(b.updatedAt)));
      } else if (mode === "mode") {
        sorted.sort((a, b) => String(a.inputMode).localeCompare(String(b.inputMode)));
      } else {
        sorted.sort((a, b) => String(b.updatedAt).localeCompare(String(a.updatedAt)));
      }

      refs.memoList.innerHTML = sorted.map((entry) => `
        <article class="memo-item" data-entry-id="${entry.entryId || ""}">
          <strong>${entry.headline || entry.entryId}</strong>
          <p>${entry.body || ""}</p>
          <div class="memo-meta">
            <span class="tag">${entry.inputMode || "text"}</span>
            <span>${entry.updatedAt || "-"}</span>
            <span>${entry.syncStage || "Local"}</span>
          </div>
        </article>
      `).join("") || "<p>まだメモがありません。</p>";

      refs.memoList.querySelectorAll("[data-entry-id]").forEach((element) => {
        element.addEventListener("click", () => {
          bridge.markViewed(element.getAttribute("data-entry-id"));
          refresh();
          setTab("history");
        });
      });
    }

    function renderHistory(history) {
      refs.historyList.innerHTML = history.map((item) => `
        <article class="history-item">
          <strong>${item.headline || item.entryId}</strong>
          <div class="history-meta">
            <span>${item.viewedAt || "-"}</span>
            <span>${item.projectId || "-"}</span>
          </div>
        </article>
      `).join("") || "<p>まだ閲覧履歴はありません。</p>";
    }

    function renderDraft(draft) {
      refs.headline.value = draft.headline || "";
      refs.memo.value = draft.body || "";
    }

    function refresh() {
      state.bootstrap = parseBootstrap();
      renderDraft(state.bootstrap.draft || {});
      renderQuestion(state.bootstrap.latestQuestion);
      renderSync(state.bootstrap.sync || { local: false, pc: false, pcSynced: false, modeHelp: "" });
      renderWorkspace(state.bootstrap.entries || []);
      renderHistory(state.bootstrap.history || []);
    }

    function persistDraft() {
      refs.autosaveChip.textContent = "自動仮保存中";
      refs.statusText.textContent = "入力中の内容を端末へ仮保存しています。";
      const payload = JSON.stringify({
        headline: refs.headline.value,
        body: refs.memo.value
      });
      bridge.saveDraft(payload);
    }

    function readSelectedPhoto(file) {
      if (!file) {
        state.selectedPhoto = null;
        refs.photoPreview.style.display = "none";
        return;
      }
      const reader = new FileReader();
      reader.onload = () => {
        state.selectedPhoto = {
          name: file.name,
          mimeType: file.type || "image/jpeg",
          dataUrl: reader.result
        };
        refs.photoPreviewImage.src = reader.result;
        refs.photoPreview.style.display = "block";
      };
      reader.readAsDataURL(file);
    }

    function saveEntry() {
      const payload = {
        headline: refs.headline.value,
        body: refs.memo.value,
        attachment: state.selectedPhoto
      };
      try {
        const result = JSON.parse(bridge.saveEntry(JSON.stringify(payload)));
        refs.statusText.textContent = result.message || "記録を確定しました。PC 側ワークスペースへの反映を待ちます。";
        refs.autosaveChip.textContent = "端末保存済み";
        refs.photoInput.value = "";
        state.selectedPhoto = null;
        refs.photoPreview.style.display = "none";
        refresh();
      } catch (error) {
        refs.statusText.textContent = "記録の確定に失敗しました。";
      }
    }

    refs.headline.addEventListener("input", persistDraft);
    refs.memo.addEventListener("input", persistDraft);
    refs.sortSelect.addEventListener("change", () => renderWorkspace((state.bootstrap || {}).entries || []));
    document.getElementById("saveButton").addEventListener("click", saveEntry);
    document.getElementById("photoButton").addEventListener("click", () => refs.photoInput.click());
    document.getElementById("clearPhotoButton").addEventListener("click", () => {
      refs.photoInput.value = "";
      readSelectedPhoto(null);
    });
    refs.photoInput.addEventListener("change", (event) => {
      const file = event.target.files && event.target.files[0];
      readSelectedPhoto(file);
      persistDraft();
    });

    document.getElementById("tabCapture").addEventListener("click", () => setTab("capture"));
    document.getElementById("tabHistory").addEventListener("click", () => setTab("history"));
    document.getElementById("tabWorkspace").addEventListener("click", () => setTab("workspace"));

    refresh();
  </script>
</body>
</html>
