services:
  syncthing:
    image: syncthing/syncthing:1.29
    container_name: iclone-syncthing
    ports:
      - "8384:8384"
      - "22000:22000/tcp"
      - "22000:22000/udp"
      - "21027:21027/udp"
    volumes:
      - ./runtime/syncthing/config:/var/syncthing/config
      - ./runtime/edge-outbox:/var/syncthing/edge-outbox
      - ./runtime/host-inbox:/var/syncthing/host-inbox
      - ./runtime/records:/var/syncthing/records
    restart: unless-stopped

  ollama:
    image: ollama/ollama:0.6.6
    container_name: iclone-ollama
    ports:
      - "11434:11434"
    volumes:
      - ./runtime/ollama:/root/.ollama
      - ./runtime/llm_inbox:/workspace/llm_inbox
    restart: unless-stopped

  observer:
    image: python:3.12-slim
    container_name: iclone-observer
    working_dir: /workspace
    command: ["python", "src/host/observer.py"]
    environment:
      ICLONE_HOST_INBOX: /workspace/runtime/host-inbox
      ICLONE_RECORDS_ROOT: /workspace/runtime/records
      ICLONE_LLM_INBOX: /workspace/runtime/llm_inbox
      ICLONE_LOGS_ROOT: /workspace/runtime/logs
      ICLONE_POLL_SECONDS: "3"
      ICLONE_PRIMARY_HOST: "http://pc-name.local"
      ICLONE_TAILSCALE_HOST: "http://tezy-gt37-tail"
      ICLONE_USE_TAILSCALE: "0"
    volumes:
      - ./:/workspace
    restart: unless-stopped
