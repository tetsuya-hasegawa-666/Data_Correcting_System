schemaVersion: "1.0.0"
profileId: "tailscale-optional-extension"
status: "optional"
currentHost:
  machineName: "Tezy-GT37"
  tailscaleName: "tezy-gt37-tail"
  fallbackEndpoint: "http://pc-name.local"
usagePolicy:
  enabledWhen:
    - "outside_same_wifi"
    - "mdns_unreachable"
  disabledWhen:
    - "same_lan_and_mdns_available"
securityNotes:
  - "日常導線は mDNS + MAC whitelist を優先する"
  - "Tailscale は例外時の延長導線としてのみ使う"

