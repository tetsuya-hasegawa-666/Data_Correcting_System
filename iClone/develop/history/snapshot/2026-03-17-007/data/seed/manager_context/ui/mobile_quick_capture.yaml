schemaVersion: "1.0.0"
screenId: "quick-capture-screen"
targetDevice: "Xperia 5 III"
states:
  - id: "idle"
    questionCard: "今いちばん気になっている遅れや詰まりは何ですか。"
    statusChip: "saved"
    primaryAction: "記録する"
  - id: "capturing_voice"
    questionCard: "そのまま話してください。あとで整理されます。"
    statusChip: "recording"
    primaryAction: "録音停止"
  - id: "syncing"
    questionCard: "保存しました。PCへ同期しています。"
    statusChip: "syncing"
    primaryAction: "閉じる"
  - id: "attention"
    questionCard: "保存済みです。PCへの同期はまだです。"
    statusChip: "attention"
    primaryAction: "再試行"
attachments:
  - "text"
  - "voice"
  - "photo"
successCriteria:
  - "入力開始から保存完了まで 5 秒以内"
  - "状態 chip だけで同期状況が理解できる"

