schemaVersion: "1.0.0"
viewSetId: "pc-review-views"
targetHost: "Tezy-GT37"
views:
  - id: "inbox-board"
    purpose: "到着ログと処理状態の把握"
    cards:
      - "new_syncs"
      - "processing_jobs"
      - "attention_needed"
  - id: "context-record-view"
    purpose: "元ログ、添付、次問、KPI 候補を同時閲覧"
    panes:
      - "source_entry"
      - "attachments"
      - "next_question"
      - "kpi_candidates"
  - id: "ops-panel"
    purpose: "Syncthing / observer / Ollama の状態確認"
    indicators:
      - "syncthing"
      - "observer"
      - "ollama"
successCriteria:
  - "到着から可視化まで 10 秒以内"
  - "どの層で止まっているか一目で判断できる"

