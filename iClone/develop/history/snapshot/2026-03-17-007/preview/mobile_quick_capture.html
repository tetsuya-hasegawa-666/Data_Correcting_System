<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quick Capture Preview</title>
  <style>
    :root {
      --bg: #f4f0ea;
      --ink: #1e2424;
      --accent: #0f766e;
      --soft: #fffdf8;
      --line: #d9d0c2;
      --warn: #b45309;
    }
    body {
      margin: 0;
      background: radial-gradient(circle at top, #faf6ef, var(--bg));
      font-family: "Yu Gothic UI", "Hiragino Sans", sans-serif;
      color: var(--ink);
    }
    .phone {
      max-width: 390px;
      min-height: 100vh;
      margin: 0 auto;
      padding: 20px 16px 32px;
      box-sizing: border-box;
    }
    .chip {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(15, 118, 110, 0.12);
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
    }
    .card {
      margin-top: 18px;
      background: var(--soft);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 12px 40px rgba(30, 36, 36, 0.08);
    }
    h1 {
      font-size: 24px;
      margin-bottom: 10px;
    }
    textarea {
      width: 100%;
      min-height: 140px;
      border: 0;
      background: transparent;
      resize: none;
      font: inherit;
      color: inherit;
      margin-top: 12px;
    }
    .tray {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }
    .tray button,
    .primary {
      border: 0;
      border-radius: 16px;
      font: inherit;
      cursor: pointer;
    }
    .tray button {
      background: #ece6da;
      padding: 10px 12px;
    }
    .primary {
      width: 100%;
      margin-top: 18px;
      padding: 16px;
      background: var(--accent);
      color: white;
      font-weight: 700;
    }
    .status {
      margin-top: 14px;
      color: var(--warn);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main class="phone">
    <span class="chip">synced</span>
    <div class="card">
      <p>Xperia 5 III / 一問一葉</p>
      <h1>今いちばん気になっている遅れや詰まりは何ですか。</h1>
      <textarea placeholder="あとで整理されるので、断片のままで構いません。"></textarea>
      <div class="tray">
        <button>音声</button>
        <button>写真</button>
        <button>タグ</button>
      </div>
      <button class="primary">記録する</button>
      <p class="status">保存済み。PC 近接時に自動同期されます。</p>
    </div>
  </main>
</body>
</html>
