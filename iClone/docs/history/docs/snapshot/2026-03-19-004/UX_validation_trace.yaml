trace_file: docs/process/UX_validation_trace.yaml
project: iClone
policy:
  rule: UX変更ごとにこのファイルへ1件追記する
  linked_docs:
    - docs/process/UX_check_work_flow.md
    - docs/process/UX_auto_validation_report.md
    - develop/plans/2026-03-17-001/market_release_lines.md
    - develop/plans/2026-03-17-001/micro_release_lines.md
entries:
  - trace_id: UXVT-2026-03-19-001
    date: 2026-03-19
    release_line: MRL-10
    summary: clone browser、trash-first delete、sticky close の UX を検証
    linked_docs:
      - docs/process/UX_check_work_flow.md
      - docs/process/UX_auto_validation_report.md
    evidence:
      - command: python -m py_compile src/host/workspace_api.py src/host/run_host_app.py src/host/adb_bridge.py
        result: pass
      - command: node --check preview/app.js
        result: pass
      - command: powershell -ExecutionPolicy Bypass -File .\scripts\sync_android_assets.ps1
        result: pass
      - command: powershell -ExecutionPolicy Bypass -File .\scripts\build_android_app.ps1
        result: pass
      - command: powershell -ExecutionPolicy Bypass -File .\scripts\install_android_app.ps1
        result: pass
      - command: curl.exe http://127.0.0.1:8874/api/workspace/bootstrap
        result: pass
    findings:
      - clone browser は mobile / desktop で同一語彙の accordion として動作
      - delete は soft delete でごみ箱へ移り、hard delete はごみ箱からのみ実行
  - trace_id: UXVT-2026-03-19-002
    date: 2026-03-19
    release_line: MRL-11
    summary: reconnect controls、黄色点滅 status、単一 trace 運用を検証
    linked_docs:
      - docs/process/UX_check_work_flow.md
      - docs/process/UX_auto_validation_report.md
      - docs/observability/current_state.md
    evidence:
      - command: python -m py_compile src/host/workspace_api.py src/host/run_host_app.py src/host/adb_bridge.py
        result: pass
      - command: node --check preview/app.js
        result: pass
      - command: powershell -ExecutionPolicy Bypass -File .\scripts\sync_android_assets.ps1
        result: pass
      - command: powershell -ExecutionPolicy Bypass -File .\scripts\build_android_app.ps1
        result: pass
      - command: powershell -ExecutionPolicy Bypass -File .\scripts\install_android_app.ps1
        result: pass
      - command: curl.exe http://127.0.0.1:8874/api/workspace/bootstrap
        result: pass
      - command: curl.exe -X POST http://127.0.0.1:8874/api/workspace/reconnect/device
        result: pass
      - command: Start-Sleep -Seconds 22; curl.exe http://127.0.0.1:8874/api/workspace/bootstrap
        result: pass
    findings:
      - desktop / mobile の上部に status と reconnect 操作を分離配置
      - 再接続中は黄色点滅で視認できる
      - reconnect endpoint 実行直後は `reconnecting = true`、22 秒後に `false` へ戻る
      - `adb reconnect` 後は端末側で USB デバッグ再許可が必要になる場合がある
