<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>iClone Workspace</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="desktop-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow" id="topEyebrow"></p>
        <h1 id="topTitle"></h1>
      </div>
      <div class="status-inline" id="statusRail"></div>
    </header>

    <section class="workspace-main">
      <section class="panel editor-panel">
        <div class="panel-head">
          <div>
            <p class="section-label" id="editorLabel"></p>
            <h2 id="editorTitle"></h2>
          </div>
          <button class="ghost-button" type="button" id="settingsToggle"></button>
        </div>

        <section class="settings-inline hidden" id="settingsPanel">
          <div class="settings-grid">
            <label class="compact-setting">
              <span id="autoSaveLabel"></span>
              <select id="autoSaveEnabled"></select>
            </label>
            <label class="compact-setting">
              <span id="autoSaveIntervalLabel"></span>
              <select id="autoSaveInterval"></select>
            </label>
            <label class="compact-setting">
              <span id="autoSyncLabel"></span>
              <select id="autoSyncEnabled"></select>
            </label>
            <label class="compact-setting">
              <span id="autoSyncIntervalLabel"></span>
              <select id="autoSyncInterval"></select>
            </label>
          </div>
          <p class="settings-note" id="settingsNote"></p>
        </section>

        <label class="field">
          <span id="headlineLabel"></span>
          <input id="headlineInput" type="text">
        </label>

        <label class="field">
          <span id="bodyLabel"></span>
          <textarea id="bodyInput"></textarea>
        </label>

        <div class="attachment-row">
          <input id="photoInput" type="file" accept="image/*" hidden>
          <button class="subtle-button" type="button" id="photoButton"></button>
          <button class="subtle-button" type="button" id="clearPhotoButton"></button>
          <button class="danger-button" type="button" id="deleteButton"></button>
        </div>

        <div class="preview-card hidden" id="photoPreviewCard">
          <img id="photoPreviewImage" alt="attachment preview">
        </div>

        <div class="action-row">
          <button class="primary-button" type="button" id="saveButton"></button>
          <button class="secondary-button" type="button" id="syncButton"></button>
        </div>

        <p class="action-note" id="actionNote"></p>
        <p class="question-inline" id="questionInline"></p>
      </section>

      <section class="panel list-panel">
        <div class="panel-head">
          <div>
            <p class="section-label" id="listLabel"></p>
            <h2 id="listTitle"></h2>
          </div>
        </div>
        <div class="record-list" id="recordList"></div>
      </section>
    </section>

    <footer class="footer-bar">
      <div class="footer-counts" id="footerCounts"></div>
      <div class="footer-next-sync" id="footerNextSync"></div>
    </footer>
  </main>
  <script src="./app.js"></script>
</body>
</html>
