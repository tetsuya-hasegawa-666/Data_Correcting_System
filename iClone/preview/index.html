<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>iClone Workspace</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Xperia 5 III / Windows workspace</p>
        <h1>コピーされたメモを使う</h1>
        <p class="lede">スマホで残したメモと写真を、PC ワークスペースでそのまま読み返し、次の質問へつなげます。</p>
      </div>
      <div class="hero-side">
        <div class="status-row">
          <article class="status-card pending" id="desktopLocalCard">
            <div class="status-name" id="desktopLocalLabel">× Local</div>
            <div class="status-copy">スマホで残せます。</div>
          </article>
          <article class="status-card pending" id="desktopPcCard">
            <div class="status-name" id="desktopPcLabel">× PC</div>
            <div class="status-copy">PC へコピーされます。</div>
          </article>
          <article class="status-card pending" id="desktopPcSyncedCard">
            <div class="status-name" id="desktopPcSyncedLabel">× PC synced</div>
            <div class="status-copy">質問まで戻ります。</div>
          </article>
        </div>
      </div>
    </header>

    <section class="summary-grid">
      <article class="summary-card">
        <p class="summary-label">メモ</p>
        <h2 id="memoCount">0</h2>
      </article>
      <article class="summary-card">
        <p class="summary-label">写真</p>
        <h2 id="photoCount">0</h2>
      </article>
      <article class="summary-card">
        <p class="summary-label">次の質問</p>
        <h2 id="questionCount">0</h2>
      </article>
      <article class="summary-card">
        <p class="summary-label">逆同期</p>
        <h2 id="reverseSyncCount">0</h2>
      </article>
    </section>

    <section class="copy-grid">
      <section class="panel focus-panel">
        <div class="panel-head">
          <div>
            <p class="panel-label">コピーされたメモ</p>
            <h2 id="latestHeadline">最新メモ</h2>
          </div>
          <p class="panel-meta" id="latestMeta">-</p>
        </div>
        <div class="copy-cards">
          <article class="copy-card">
            <p class="copy-label">本文</p>
            <p id="latestBody" class="copy-body">-</p>
          </article>
          <article class="copy-card">
            <p class="copy-label">次の質問</p>
            <p id="latestQuestion" class="copy-body waiting">まだ質問がありません。</p>
          </article>
        </div>
      </section>

      <section class="panel side-panel">
        <div class="panel-head">
          <div>
            <p class="panel-label">コピー状況</p>
            <h2>接続と反映</h2>
          </div>
        </div>
        <ul class="sync-list" id="syncList"></ul>
      </section>
    </section>

    <section class="workspace-grid">
      <section class="panel">
        <div class="panel-head">
          <div>
            <p class="panel-label">ワークスペース</p>
            <h2>PC に届いたメモ</h2>
          </div>
        </div>
        <div id="workspaceList" class="record-list"></div>
      </section>

      <section class="panel gallery-panel">
        <div class="panel-head">
          <div>
            <p class="panel-label">写真</p>
            <h2>添付ギャラリー</h2>
          </div>
        </div>
        <div id="photoGallery" class="photo-gallery"></div>
      </section>
    </section>
  </main>

  <script src="../runtime/logs/status_snapshot.js"></script>
  <script src="../runtime/logs/review_snapshot.js"></script>
  <script src="./app.js"></script>
</body>
</html>
